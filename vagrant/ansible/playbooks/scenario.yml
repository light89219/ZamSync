---
# ZamSync Hospital Network Simulation Scenario
#
# Phases:
#   1. OFFLINE  -- Clinics submit N patient events with no hub connectivity
#   2. DEGRADE  -- Apply tc netem (2G/satellite/3G) on clinic interfaces
#   3. SYNC     -- Open sync window: all clinics sync to hub simultaneously
#   4. CUT      -- Cut network mid-sync to test resilience (optional)
#   5. RESUME   -- Restore network, complete sync, verify convergence
#   6. METRICS  -- Collect and display metrics from all nodes
#
# Run:
#   ansible-playbook -i ansible/inventory.ini ansible/playbooks/scenario.yml
#   ansible-playbook ... -e events_per_clinic=1000 -e network_profile=satellite

- name: "Phase 0: Reset -- stop services, clear WALs"
  hosts: all
  become: true
  tasks:
    - name: Stop ZamSync service
      ansible.builtin.systemd:
        name: zamsync-serve
        state: stopped
      failed_when: false

    - name: Clear WAL data (keep TLS certs)
      ansible.builtin.shell:
        cmd: "find {{ zamsync_data_dir }} -name '*.wal' -o -name 'peers.state' -o -name '.node_id' | xargs rm -f"
      changed_when: true

    - name: Read hub node_id (recreated on next start)
      ansible.builtin.set_fact:
        scenario_events: "{{ events_per_clinic | default(scenario_events_per_clinic) }}"

- name: "Phase 1: OFFLINE -- clinics submit patient events without hub"
  hosts: clinics
  become: true
  vars:
    event_count: "{{ events_per_clinic | default(scenario_events_per_clinic) }}"
  tasks:
    - name: Start local ZamSync (no hub sync yet)
      ansible.builtin.systemd:
        name: zamsync-serve
        state: started

    - name: Wait for ZamSync to be ready
      ansible.builtin.wait_for:
        port: "{{ zamsync_sync_port }}"
        delay: 1
        timeout: 15

    - name: Record phase 1 start time
      ansible.builtin.set_fact:
        phase1_start: "{{ ansible_date_time.epoch }}"

    - name: Submit {{ event_count }} patient events (offline)
      ansible.builtin.shell:
        cmd: |
          for i in $(seq 1 {{ event_count }}); do
            zamsync submit {{ zamsync_data_dir }} \
              '{"patient_id":"'{{ inventory_hostname }}'-'$i'","type":"vitals","weight_kg":65,"temp_c":37.1}'
          done
      become_user: "{{ zamsync_user }}"
      changed_when: true

    - name: Record phase 1 end time and get event count
      ansible.builtin.shell:
        cmd: zamsync info {{ zamsync_data_dir }} | grep -oP 'events=\K\d+'
      register: phase1_events
      changed_when: false
      become_user: "{{ zamsync_user }}"

    - name: Store baseline metrics
      ansible.builtin.set_fact:
        metrics_offline_events: "{{ phase1_events.stdout | trim }}"
        metrics_phase1_duration: "{{ ansible_date_time.epoch | int - phase1_start | int }}"

    - name: Print offline phase results
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} -- offline: {{ metrics_offline_events }} events submitted in {{ metrics_phase1_duration }}s"

- name: "Phase 2: DEGRADE -- apply network constraints"
  import_playbook: degrade-network.yml

- name: "Phase 3: SYNC -- open connectivity window, sync all clinics to hub"
  hosts: hub
  become: true
  tasks:
    - name: Start hub ZamSync
      ansible.builtin.systemd:
        name: zamsync-serve
        state: started

    - name: Wait for hub to be ready
      ansible.builtin.wait_for:
        port: "{{ zamsync_sync_port }}"
        delay: 1
        timeout: 15

- name: Sync clinics to hub (parallel)
  hosts: clinics
  become: true
  tasks:
    - name: Read hub node_id
      ansible.builtin.slurp:
        src: /tmp/zamsync-hub-node-id
      register: hub_id_file
      delegate_to: localhost
      become: false

    - name: Set hub_node_id
      ansible.builtin.set_fact:
        hub_node_id: "{{ hub_id_file.content | b64decode | trim }}"

    - name: Capture pre-sync bytes on interface
      ansible.builtin.shell:
        cmd: "cat /proc/net/dev | grep {{ netem_interface }} | awk '{print $10}'"
      register: bytes_before
      changed_when: false

    - name: Record sync start time
      ansible.builtin.set_fact:
        sync_start: "{{ ansible_date_time.epoch }}"

    - name: Sync to hub (degraded network)
      ansible.builtin.command:
        cmd: >
          zamsync sync {{ zamsync_data_dir }}
          {{ hub_sync_addr }} {{ hub_node_id }} --tls
      become_user: "{{ zamsync_user }}"
      register: sync_result
      timeout: 300

    - name: Capture post-sync bytes on interface
      ansible.builtin.shell:
        cmd: "cat /proc/net/dev | grep {{ netem_interface }} | awk '{print $10}'"
      register: bytes_after
      changed_when: false

    - name: Store sync metrics
      ansible.builtin.set_fact:
        metrics_sync_duration: "{{ ansible_date_time.epoch | int - sync_start | int }}"
        metrics_bytes_sent: "{{ bytes_after.stdout | int - bytes_before.stdout | int }}"
        metrics_sync_output: "{{ sync_result.stdout }}"

    - name: Print sync results
      ansible.builtin.debug:
        msg: |
          {{ inventory_hostname }} -- sync complete
          Duration: {{ metrics_sync_duration }}s
          Bytes sent over wire: {{ metrics_bytes_sent | int | human_readable(unit='B') }}
          Output: {{ metrics_sync_output }}

- name: "Phase 4: VERIFY -- check convergence on hub"
  hosts: hub
  become: true
  tasks:
    - name: Get hub event count after sync
      ansible.builtin.shell:
        cmd: zamsync info {{ zamsync_data_dir }} | grep -oP 'events=\K\d+'
      register: hub_events
      changed_when: false
      become_user: "{{ zamsync_user }}"

    - name: Print hub convergence status
      ansible.builtin.debug:
        msg: "Hub -- total events after sync: {{ hub_events.stdout | trim }}"

- name: "Phase 5: COLLECT METRICS -- gather structured data from all nodes"
  hosts: all
  become: true
  tasks:
    - name: Get event count
      ansible.builtin.shell:
        cmd: zamsync info {{ zamsync_data_dir }} | grep -oP 'events=\K\d+'
      register: node_events
      changed_when: false
      failed_when: false
      become_user: "{{ zamsync_user }}"

    - name: Get WAL size
      ansible.builtin.shell:
        cmd: "stat -c%s {{ zamsync_data_dir }}/events.wal 2>/dev/null || echo 0"
      register: wal_size
      changed_when: false

    - name: Get ZamSync process memory (RSS in KB)
      ansible.builtin.shell:
        cmd: "ps -o rss= -C zamsync 2>/dev/null | awk '{sum+=$1} END {print sum+0}'"
      register: rss_kb
      changed_when: false

    - name: Write node metrics to JSON
      ansible.builtin.copy:
        content: |
          {
            "node": "{{ inventory_hostname }}",
            "role": "{{ zamsync_role | default('unknown') }}",
            "events": {{ node_events.stdout | default(0) | trim }},
            "wal_size_bytes": {{ wal_size.stdout | trim }},
            "memory_rss_kb": {{ rss_kb.stdout | trim }},
            "sync_duration_s": {{ metrics_sync_duration | default(0) }},
            "bytes_sent": {{ metrics_bytes_sent | default(0) }},
            "offline_events": {{ metrics_offline_events | default(0) }}
          }
        dest: /tmp/zamsync-metrics-{{ inventory_hostname }}.json

    - name: Fetch metrics to controller
      ansible.builtin.fetch:
        src: /tmp/zamsync-metrics-{{ inventory_hostname }}.json
        dest: "{{ playbook_dir }}/../results/{{ inventory_hostname }}.json"
        flat: true

- name: "Phase 6: GENERATE REPORT"
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Write scenario metadata
      ansible.builtin.copy:
        content: |
          {
            "scenario_date": "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}",
            "network_profile": "{{ active_network_profile }}",
            "events_per_clinic": {{ events_per_clinic | default(scenario_events_per_clinic) }},
            "profile": {{ network_profiles[active_network_profile] | to_json }}
          }
        dest: "{{ playbook_dir }}/../results/scenario.json"

    - name: Generate HTML benchmark report
      ansible.builtin.command:
        cmd: python3 {{ playbook_dir }}/../scripts/report.py {{ playbook_dir }}/../results
      changed_when: true
      register: report_output

    - name: Show report location
      ansible.builtin.debug:
        msg: "{{ report_output.stdout }}"
