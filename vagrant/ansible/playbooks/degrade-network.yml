---
# Apply tc netem network degradation on clinic nodes.
# The profile is selected via `active_network_profile` in group_vars/all.yml
# or overridden at runtime: -e active_network_profile=satellite
#
# Run: ansible-playbook -i ansible/inventory.ini ansible/playbooks/degrade-network.yml
#      ansible-playbook ... -e active_network_profile=satellite

- name: Apply network degradation on clinic nodes
  hosts: clinics
  become: true
  vars:
    profile: "{{ network_profiles[active_network_profile] }}"
  tasks:
    - name: Clear any existing tc qdisc on interface
      ansible.builtin.command:
        cmd: tc qdisc del dev {{ netem_interface }} root
      failed_when: false
      changed_when: true

    - name: Apply tc netem profile -- {{ profile.label }}
      ansible.builtin.command:
        cmd: >
          tc qdisc add dev {{ netem_interface }} root netem
          delay {{ profile.delay_ms }}ms {{ profile.delay_jitter_ms }}ms distribution normal
          loss {{ profile.loss_pct }}
          corrupt {{ profile.corrupt_pct }}
          rate {{ profile.bandwidth_kbps }}kbit
      changed_when: true

    - name: Show applied qdisc
      ansible.builtin.command:
        cmd: tc qdisc show dev {{ netem_interface }}
      register: qdisc_output
      changed_when: false

    - name: Print network profile
      ansible.builtin.debug:
        msg: |
          {{ inventory_hostname }} -- network profile: {{ profile.label }}
          Latency: {{ profile.delay_ms }}ms +/- {{ profile.delay_jitter_ms }}ms
          Bandwidth: {{ profile.bandwidth_kbps }} kbps
          Packet loss: {{ profile.loss_pct }}
          Corruption: {{ profile.corrupt_pct }}
          tc output: {{ qdisc_output.stdout }}
