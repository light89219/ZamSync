name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release -- e.g. 1.0.1 (no v prefix)'
        required: true
        type: string

jobs:
  prepare:
    name: Bump version and tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write  # required for gh workflow run (dispatch build-release.yml)
      pull-requests: write  # required for gh pr create (version bump PR)

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Bad version '${{ inputs.version }}' -- must be MAJOR.MINOR.PATCH"
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable

      - name: Bump version in Cargo.toml
        run: |
          sed -i -E 's/^version = "[0-9]+\.[0-9]+\.[0-9]+"$/version = "${{ inputs.version }}"/' Cargo.toml
          grep -E '^version = "${{ inputs.version }}"' Cargo.toml || {
            echo "::error::Version replacement failed"
            exit 1
          }

      - name: Regenerate Cargo.lock
        # cargo generate-lockfile rewrites Cargo.lock to match the bumped Cargo.toml.
        # Without this step, Cargo.lock still contains the old version and
        # `cargo publish` fails with "files in the working directory contain changes
        # that were not yet committed" -- even though the tag commit looks clean.
        run: cargo generate-lockfile

      - name: Commit and push version bump PR branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          # No-op if version was already bumped (re-run on same version)
          git diff --cached --quiet || git commit -m "chore: release v${{ inputs.version }}"
          # Push to a side branch -- branch protection blocks direct pushes to main
          # without passing CI. The tag (below) is what drives the actual release.
          git push origin HEAD:chore/bump-v${{ inputs.version }} --force

      - name: Open version bump PR
        run: |
          gh pr create \
            --title "chore: release v${{ inputs.version }}" \
            --body "Automated version bump. Merge after CI passes." \
            --base main \
            --head chore/bump-v${{ inputs.version }} \
          || echo "PR already open -- skipping"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push tag
        run: |
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Trigger build-release.yml on tag
        run: |
          gh workflow run build-release.yml --ref "v${{ inputs.version }}"
          echo "Dispatched build-release.yml on v${{ inputs.version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ inputs.version }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish zamsync-core
        run: cargo publish -p zamsync-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io indexing
        run: sleep 40

      - name: Publish zamsync-storage
        run: cargo publish -p zamsync-storage
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish zamsync-network
        run: cargo publish -p zamsync-network
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io indexing
        run: sleep 40

      - name: Publish zamsync-testing
        run: cargo publish -p zamsync-testing
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io indexing
        run: sleep 40

      - name: Publish zamsync (CLI)
        run: cargo publish -p zamsync
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
