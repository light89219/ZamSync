---
# Provision all nodes: install ZamSync, generate PKI, configure TLS.
#
# Run: ansible-playbook -i ansible/inventory.ini ansible/playbooks/provision.yml

- name: Install ZamSync on all nodes
  hosts: all
  become: true
  roles:
    - zamsync

# ---- PKI bootstrap --------------------------------------------------------
# Hub generates the CA + its own cert. Clinics are signed by the hub CA.
# This mirrors the real deployment workflow:
#   1. zamsync keygen <hub-dir>       → generates CA + hub cert
#   2. zamsync sign <clinic-dir> --ca <hub-dir>  → signs clinic cert

- name: Bootstrap hub PKI
  hosts: hub
  become: true
  tasks:
    - name: Check if hub PKI already exists
      ansible.builtin.stat:
        path: "{{ zamsync_data_dir }}/tls/ca.crt"
      register: hub_pki

    - name: Generate hub CA and node certificate
      when: not hub_pki.stat.exists
      ansible.builtin.command:
        cmd: zamsync keygen {{ zamsync_data_dir }}
      become_user: "{{ zamsync_user }}"

    - name: Fetch hub CA certificate for clinic signing
      ansible.builtin.fetch:
        src: "{{ zamsync_data_dir }}/tls/ca.crt"
        dest: /tmp/zamsync-ca.crt
        flat: true

    - name: Fetch hub CA key for clinic signing
      ansible.builtin.fetch:
        src: "{{ zamsync_data_dir }}/tls/ca.key"
        dest: /tmp/zamsync-ca.key
        flat: true

    - name: Read hub node ID
      ansible.builtin.slurp:
        src: "{{ zamsync_data_dir }}/.node_id"
      register: hub_node_id_raw

    - name: Set hub_node_id fact
      ansible.builtin.set_fact:
        hub_node_id: "{{ hub_node_id_raw.content | b64decode | trim }}"

    - name: Write hub_node_id to local file (used by scenario playbook)
      ansible.builtin.copy:
        content: "{{ hub_node_id }}"
        dest: /tmp/zamsync-hub-node-id
      delegate_to: localhost
      become: false

- name: Sign clinic certificates with hub CA
  hosts: clinics
  become: true
  tasks:
    - name: Check if clinic PKI already exists
      ansible.builtin.stat:
        path: "{{ zamsync_data_dir }}/tls/node.crt"
      register: clinic_pki

    - name: Copy hub CA to clinic
      when: not clinic_pki.stat.exists
      ansible.builtin.copy:
        src: /tmp/zamsync-ca.crt
        dest: "{{ zamsync_data_dir }}/tls/ca.crt"
        owner: "{{ zamsync_user }}"
        group: "{{ zamsync_group }}"
        mode: "0640"

    - name: Copy hub CA key to clinic (for signing, removed after)
      when: not clinic_pki.stat.exists
      ansible.builtin.copy:
        src: /tmp/zamsync-ca.key
        dest: "{{ zamsync_data_dir }}/tls/ca.key"
        owner: "{{ zamsync_user }}"
        group: "{{ zamsync_group }}"
        mode: "0600"

    - name: Sign clinic node certificate with hub CA
      when: not clinic_pki.stat.exists
      ansible.builtin.command:
        cmd: zamsync sign {{ zamsync_data_dir }} --ca {{ zamsync_data_dir }}
      become_user: "{{ zamsync_user }}"

    - name: Remove CA key from clinic (security: key must not persist on clinic)
      ansible.builtin.file:
        path: "{{ zamsync_data_dir }}/tls/ca.key"
        state: absent

- name: Start ZamSync services
  hosts: all
  become: true
  tasks:
    - name: Ensure ZamSync is running
      ansible.builtin.systemd:
        name: zamsync-serve
        state: started
        enabled: true
