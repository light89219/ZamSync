name: Build Release

on:
  push:
    tags:
      - 'v*'
  # Called explicitly by release.yml after pushing the tag.
  # GITHUB_TOKEN cannot trigger cross-workflow events (GitHub security policy),
  # so release.yml dispatches us with --ref "vX.Y.Z" on the tag ref.
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag to release, e.g. v1.0.1 (leave empty when run on a tag ref)'
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always
  # Always normalise to "vX.Y.Z" -- works whether user typed "1.0.0" or "v1.0.0"
  RELEASE_TAG: ${{ inputs.version != '' && (startsWith(inputs.version, 'v') && inputs.version || format('v{0}', inputs.version)) || github.ref_name }}

jobs:
  # ── Compile binaries ─────────────────────────────────────────────────────────
  #
  # All Linux targets use musl -- fully static binaries with zero libc
  # dependency. This avoids GLIBC version mismatches between the build runner
  # (ubuntu-latest = GLIBC 2.39) and the runtime image (Debian Bookworm = 2.36).
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: false
            artifact: zamsync-linux-x86_64
            binary: zamsync

          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
            artifact: zamsync-linux-aarch64
            binary: zamsync

          - target: armv7-unknown-linux-musleabihf
            os: ubuntu-latest
            use_cross: true
            artifact: zamsync-linux-armv7
            binary: zamsync

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_cross: false
            artifact: zamsync-windows-x86_64
            binary: zamsync.exe

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install musl tools (x86_64 native musl build)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Install cross (ARM targets)
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          src="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          dst="dist/${{ matrix.artifact }}"
          cp "$src" "$dst"
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            mv "$dst" "${dst}.exe"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/
          if-no-files-found: error

  # ── Docker multi-arch image on GHCR ─────────────────────────────────────────
  docker:
    name: Docker (ghcr.io)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/download-artifact@v8
        with:
          path: dist/

      - name: Prepare build context
        run: |
          mkdir -p docker-ctx
          cp dist/zamsync-linux-x86_64/zamsync-linux-x86_64   docker-ctx/zamsync-linux-amd64
          cp dist/zamsync-linux-aarch64/zamsync-linux-aarch64 docker-ctx/zamsync-linux-arm64
          cp dist/zamsync-linux-armv7/zamsync-linux-armv7     docker-ctx/zamsync-linux-armv7
          chmod +x docker-ctx/*

      - name: Compute Docker tags
        id: tags
        run: |
          tag="${{ env.RELEASE_TAG }}"
          ver="${tag#v}"
          major_minor="$(echo "$ver" | cut -d. -f1-2)"
          # GHCR requires lowercase
          repo="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "value=${repo}:${ver},${repo}:${major_minor},${repo}:latest" >> $GITHUB_OUTPUT
          echo "image=${repo}" >> $GITHUB_OUTPUT

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: docker-ctx
          file: Dockerfile.release
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.tags.outputs.value }}

  # ── GitHub Release with checksums ────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist/

      - name: Collect binaries and generate checksums
        run: |
          mkdir -p release
          cp dist/zamsync-linux-x86_64/zamsync-linux-x86_64       release/
          cp dist/zamsync-linux-aarch64/zamsync-linux-aarch64     release/
          cp dist/zamsync-linux-armv7/zamsync-linux-armv7         release/
          cp dist/zamsync-windows-x86_64/zamsync-windows-x86_64.exe release/
          cd release
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "ZamSync ${{ env.RELEASE_TAG }}"
          body: |
            ## ZamSync ${{ env.RELEASE_TAG }}

            Offline-first synchronization engine for intermittent-connectivity deployments.

            ### Install

            ```bash
            # Linux x86_64
            curl -fsSL -o zamsync https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}/zamsync-linux-x86_64
            chmod +x zamsync && sudo mv zamsync /usr/local/bin/

            # Linux ARM64 (Raspberry Pi 4, AWS Graviton)
            curl -fsSL -o zamsync https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}/zamsync-linux-aarch64
            chmod +x zamsync && sudo mv zamsync /usr/local/bin/

            # Linux ARMv7 (Raspberry Pi 2 / 3)
            curl -fsSL -o zamsync https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}/zamsync-linux-armv7
            chmod +x zamsync && sudo mv zamsync /usr/local/bin/

            # Windows (PowerShell)
            Invoke-WebRequest -Uri "https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}/zamsync-windows-x86_64.exe" -OutFile zamsync.exe
            ```

            ### Docker

            ```bash
            docker pull ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):${{ env.RELEASE_TAG }}
            # or latest
            docker pull ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):latest
            ```

            ### Verify checksums

            ```bash
            sha256sum -c SHA256SUMS.txt
            ```
          files: |
            release/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  # ── Smoke tests -- verify the binary and Docker image actually work ───────────
  smoke-test:
    name: Smoke test (amd64)
    runs-on: ubuntu-latest
    needs: [github-release, docker]

    steps:
      - name: Download amd64 binary
        uses: actions/download-artifact@v8
        with:
          name: zamsync-linux-x86_64
          path: bin/

      - name: Binary smoke test
        run: |
          chmod +x bin/zamsync-linux-x86_64
          mkdir /tmp/zs-smoke

          # info creates the node directory and prints node ID
          bin/zamsync-linux-x86_64 info /tmp/zs-smoke
          echo "info: OK"

          # submit an event
          bin/zamsync-linux-x86_64 submit /tmp/zs-smoke '{"smoke": true}'
          echo "submit: OK"

          # audit should show 1 event
          count=$(bin/zamsync-linux-x86_64 audit /tmp/zs-smoke --format json | wc -l)
          [ "$count" -eq 1 ] || { echo "audit: expected 1 event, got $count"; exit 1; }
          echo "audit: OK ($count event)"

      - name: Docker smoke test
        run: |
          repo="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          tag="${{ env.RELEASE_TAG }}"

          docker pull "${repo}:${tag#v}"

          mkdir /tmp/zs-docker
          chmod 777 /tmp/zs-docker

          docker run --rm -v /tmp/zs-docker:/data "${repo}:${tag#v}" info /data
          echo "docker info: OK"

          docker run --rm -v /tmp/zs-docker:/data "${repo}:${tag#v}" submit /data '{"smoke": true}'
          echo "docker submit: OK"
