---
# Remove all tc netem rules and restore full network on clinic nodes.
#
# Run: ansible-playbook -i ansible/inventory.ini ansible/playbooks/restore-network.yml

- name: Restore network on clinic nodes
  hosts: clinics
  become: true
  tasks:
    - name: Remove tc qdisc (restore full network)
      ansible.builtin.command:
        cmd: tc qdisc del dev {{ netem_interface }} root
      failed_when: false
      changed_when: true

    - name: Confirm network restored
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} -- network restored to full speed"
