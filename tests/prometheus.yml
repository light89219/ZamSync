global:
  scrape_interval: 2s
  evaluation_interval: 2s

scrape_configs:
  - job_name: 'zamsync_hub_seq'
    static_configs:
      - targets: ['hub-seq:9090']
    metrics_path: '/metrics'

  - job_name: 'zamsync_hub_con'
    static_configs:
      - targets: ['hub-con:9090']
    metrics_path: '/metrics'
